<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="100%">
  <style>
    .bg-circle { stroke: #0f8096; stroke-width: 1.5; fill: none; transition: stroke 0.3s; }
    .arrow { fill: #0f8096; transition: fill 0.3s; }
    .text-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #263238; transition: fill 0.3s; }
    .shape-stroke { stroke: #263238; stroke-width: 1; transition: stroke 0.3s; }
    
    .primary-fill { fill: #0f8096; transition: fill 0.3s; }
    .secondary-fill { fill: #0277bd; transition: fill 0.3s; }
    .cylinder-body { fill: #2e7d32; transition: fill 0.3s; }
    .cylinder-top { fill: #81c784; transition: fill 0.3s; }

    /* Sequential Step-by-Step Creation Animations */
    .circle-1 { transform-origin: 90px 100px; animation: drawCircle1 12s infinite ease-in-out; }
    .shapes-1 { transform-origin: 90px 100px; animation: popShapes1 12s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
    .step-2 { transform-origin: 175px 100px; animation: arrow1Anim 12s infinite ease-in-out; }
    
    .circle-2 { transform-origin: 260px 100px; animation: drawCircle2 12s infinite ease-in-out; }
    .shapes-2 { transform-origin: 260px 100px; animation: popShapes2 12s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
    .step-4 { transform-origin: 345px 100px; animation: arrow2Anim 12s infinite ease-in-out; }
    
    .circle-3 { transform-origin: 430px 100px; animation: drawCircle3 12s infinite ease-in-out; }
    .shapes-3 { transform-origin: 430px 100px; animation: popShapes3 12s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
    .step-6 { transform-origin: 515px 100px; animation: arrow3Anim 12s infinite ease-in-out; }
    
    .circle-4 { transform-origin: 600px 100px; animation: drawCircle4 12s infinite ease-in-out; }
    .shapes-4 { transform-origin: 600px 100px; animation: popShapes4 12s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Continuous float animations for shapes inside circles */
    .float-g1 { animation: floatAnim1 4s infinite ease-in-out alternate; }
    .float-g2 { animation: floatAnim2 3.5s infinite ease-in-out alternate; }
    .float-g3 { animation: floatAnim3 3s infinite ease-in-out alternate; }
    .float-g4 { animation: floatAnim4 4.5s infinite ease-in-out alternate; }

    @keyframes floatAnim1 {
      0% { transform: translateY(0); }
      100% { transform: translateY(-3px); }
    }
    @keyframes floatAnim2 {
      0% { transform: translateY(-1px); }
      100% { transform: translateY(2px); }
    }
    @keyframes floatAnim3 {
      0% { transform: translateY(1px); }
      100% { transform: translateY(-2px); }
    }
    @keyframes floatAnim4 {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }

    /* Circle 1 Keyframes */
    @keyframes drawCircle1 {
      0% { opacity: 0; transform: scale(0.8); }
      6.7%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }
    @keyframes popShapes1 {
      0%, 6.7% { opacity: 0; transform: scale(0); }
      13.3%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* Arrow 1 Keyframes */
    @keyframes arrow1Anim {
      0%, 13.3% { opacity: 0; transform: translateX(-10px); }
      20%, 91.7% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(10px); }
    }

    /* Circle 2 Keyframes */
    @keyframes drawCircle2 {
      0%, 20% { opacity: 0; transform: scale(0.8); }
      26.7%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }
    @keyframes popShapes2 {
      0%, 26.7% { opacity: 0; transform: scale(0); }
      33.3%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* Arrow 2 Keyframes */
    @keyframes arrow2Anim {
      0%, 33.3% { opacity: 0; transform: translateX(-10px); }
      40%, 91.7% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(10px); }
    }

    /* Circle 3 Keyframes */
    @keyframes drawCircle3 {
      0%, 40% { opacity: 0; transform: scale(0.8); }
      46.7%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }
    @keyframes popShapes3 {
      0%, 46.7% { opacity: 0; transform: scale(0); }
      53.3%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* Arrow 3 Keyframes */
    @keyframes arrow3Anim {
      0%, 53.3% { opacity: 0; transform: translateX(-10px); }
      60%, 91.7% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(10px); }
    }

    /* Circle 4 Keyframes */
    @keyframes drawCircle4 {
      0%, 60% { opacity: 0; transform: scale(0.8); }
      66.7%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }
    @keyframes popShapes4 {
      0%, 66.7% { opacity: 0; transform: scale(0); }
      73.3%, 91.7% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    @media (prefers-color-scheme: dark) {
      .bg-circle { stroke: #26c6da; }
      .arrow { fill: #26c6da; }
      .text-label { fill: #eceff1; }
      .shape-stroke { stroke: #121212; }
      
      .primary-fill { fill: #26c6da; }
      .secondary-fill { fill: #29b6f6; }
      .cylinder-body { fill: #4caf50; }
      .cylinder-top { fill: #a5d6a7; }
    }
  </style>

  <!-- Circle 1 and its Components -->
  <circle cx="90" cy="100" r="65" class="bg-circle circle-1" />
  <g class="shapes-1">
    <g class="float-g1">
      <!-- Cross -->
      <path d="M 72,62 H 77 V 57 H 83 V 62 H 88 V 68 H 83 V 73 H 77 V 68 H 72 Z" class="primary-fill shape-stroke" />
      <!-- Red Octagon -->
      <path d="M 111,61 L 119,61 L 122,65 V 71 L 119,75 H 111 L 108,71 V 65 Z" fill="#d50000" class="shape-stroke" />
      <!-- Green Corner -->
      <path d="M 47,92 H 63 V 98 H 53 V 108 H 47 Z" fill="#81c784" class="shape-stroke" />
      <!-- Purple Pacman -->
      <path d="M 100,95 L 110,95 A 10,10 0 1,1 100,85 Z" fill="#7e57c2" class="shape-stroke" />
      <!-- Orange Pentagon -->
      <path d="M 121,102 L 128,95 H 135 L 135,104 L 128,109 Z" fill="#f57c00" class="shape-stroke" />
      <!-- Blue Wave/Banner -->
      <path d="M 52,124 H 68 V 134 C 60,131 60,139 52,135 Z" class="secondary-fill shape-stroke" />
      <!-- Green Cylinder -->
      <path d="M 87,131 V 142 A 8,3 0 0,0 103,142 V 131 Z" class="cylinder-body shape-stroke" />
      <ellipse cx="95" cy="131" rx="8" ry="3" class="cylinder-top shape-stroke" />
      <!-- Blue Cloud -->
      <path d="M 119,124 C 115,124 114,128 117,130 C 114,133 119,136 122,135 C 125,136 130,133 127,130 C 130,126 125,123 122,124 Z" fill="#90caf9" class="shape-stroke" />
    </g>
  </g>

  <!-- Arrow 1 and Label YAGNI -->
  <g class="step-2">
    <path d="M 165,95 H 177 V 90 L 185,100 L 177,110 V 105 H 165 Z" class="arrow" />
    <text x="175" y="175" class="text-label" text-anchor="middle">YAGNI</text>
  </g>

  <!-- Circle 2 and its Components -->
  <circle cx="260" cy="100" r="65" class="bg-circle circle-2" />
  <g class="shapes-2">
    <g class="float-g2">
      <!-- Cross -->
      <path d="M 242,62 H 247 V 57 H 253 V 62 H 258 V 68 H 253 V 73 H 247 V 68 H 242 Z" class="primary-fill shape-stroke" />
      <!-- Red Octagon -->
      <path d="M 281,61 L 289,61 L 292,65 V 71 L 289,75 H 281 L 278,71 V 65 Z" fill="#d50000" class="shape-stroke" />
      <!-- Green Corner -->
      <path d="M 217,92 H 233 V 98 H 223 V 108 H 217 Z" fill="#81c784" class="shape-stroke" />
      <!-- Purple Pacman -->
      <path d="M 270,95 L 280,95 A 10,10 0 1,1 270,85 Z" fill="#7e57c2" class="shape-stroke" />
      <!-- Blue Wave/Banner -->
      <path d="M 222,124 H 238 V 134 C 230,131 230,139 222,135 Z" class="secondary-fill shape-stroke" />
    </g>
  </g>

  <!-- Arrow 2 and Label KISS -->
  <g class="step-4">
    <path d="M 335,95 H 347 V 90 L 355,100 L 347,110 V 105 H 335 Z" class="arrow" />
    <text x="345" y="175" class="text-label" text-anchor="middle">KISS</text>
  </g>

  <!-- Circle 3 and its Components -->
  <circle cx="430" cy="100" r="65" class="bg-circle circle-3" />
  <g class="shapes-3">
    <g class="float-g3">
      <!-- Blue Square -->
      <rect x="403" y="56" width="18" height="18" rx="2" class="primary-fill shape-stroke" />
      <!-- Red Square -->
      <rect x="429" y="56" width="18" height="18" rx="2" fill="#d50000" class="shape-stroke" />
      <!-- Green Triangle -->
      <path d="M 395,110 L 417,80 V 110 Z" fill="#81c784" class="shape-stroke" />
      <!-- Purple Circle -->
      <circle cx="465" cy="95" r="10" fill="#7e57c2" class="shape-stroke" />
      <!-- Blue Banner Square -->
      <rect x="421" y="121" width="18" height="18" rx="2" class="secondary-fill shape-stroke" />
    </g>
  </g>

  <!-- Arrow 3 and Label DRY -->
  <g class="step-6">
    <path d="M 505,95 H 517 V 90 L 525,100 L 517,110 V 105 H 505 Z" class="arrow" />
    <text x="515" y="175" class="text-label" text-anchor="middle">DRY</text>
  </g>

  <!-- Circle 4 and its Components -->
  <circle cx="600" cy="100" r="65" class="bg-circle circle-4" />
  <g class="shapes-4">
    <g class="float-g4">
      <!-- Overlapping Red and Blue Squares -->
      <g>
        <rect x="597" y="56" width="18" height="18" rx="2" fill="#d50000" class="shape-stroke" />
        <rect x="589" y="62" width="18" height="18" rx="2" class="primary-fill shape-stroke" />
      </g>
      <!-- Green Triangle -->
      <path d="M 565,110 L 587,80 V 110 Z" fill="#81c784" class="shape-stroke" />
      <!-- Purple Circle -->
      <circle cx="635" cy="95" r="10" fill="#7e57c2" class="shape-stroke" />
    </g>
  </g>
</svg>
